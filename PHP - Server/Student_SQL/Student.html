<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Student Grade Calculator</h1>
        <form action="grades.php" method="post">
            <div class="form-group">
                <label for="grade1">Grade 1</label>
                <input type="number" id="grade1" name="grades[]" min="1" max="10" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="grade2">Grade 2</label>
                <input type="number" id="grade2" name="grades[]" min="1" max="10" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="grade3">Grade 3</label>
                <input type="number" id="grade3" name="grades[]" min="1" max="10" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="grade4">Grade 4</label>
                <input type="number" id="grade4" name="grades[]" min="1" max="10" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="grade5">Grade 5</label>
                <input type="number" id="grade5" name="grades[]" min="1" max="10" step="0.01" required>
            </div>
            <button type="submit" class="submit-btn">Calculate</button>
            <button type="reset" class="reset-btn">Reset</button>
        </form>
    </div>
</body>
</html>
