<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>My Homepage</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}
	
	body {
		font-family: 'Roboto', sans-serif;
		background-color: #121212; 
		color: #e0e0e0;
		display: flex;
		flex-direction: column;
		min-height: 100vh;
		padding: 0 20px;
	}
	
	header, footer {
		background-color: #1f1f1f;
		color: #ffd700; 
		text-align: center;
		padding: 20px 0;
		font-weight: 700;
		text-transform: uppercase;
		letter-spacing: 2px;
		box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	}
		
	h2 {
		margin-bottom: 20px;
		font-weight: bold;
		color: #ffcc00; 
		font-style: italic;
	}
	
	.container {
		max-width: 600px;
		margin: 40px auto;
		background: #2c2c2c;
		padding: 40px;
		border-radius: 12px;
		box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
		border: 1px solid #444;
		transition: all 0.3s ease;
	}
	
	.container:hover {
		box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
	}
	
	label {
		display: block;
		margin-bottom: 8px;
		font-size: 14px;
		color: #ffd700;
		font-weight: 600;
		letter-spacing: 0.5px;
	}
	
	input[type="text"], select {
		width: 100%;
		padding: 12px;
		margin-bottom: 20px;
		background-color: #1f1f1f;
		color: #e0e0e0;
		border: 2px solid #444;
		border-radius: 6px;
		outline: none;
		font-size: 16px;
		transition: border 0.3s ease, background-color 0.3s ease;
	}
	
	input[type="text"]:focus, select:focus {
		border: 2px solid #ffd700; 
		background-color: #333;
	}
	
	input[type="radio"] {
		margin-right: 6px;
	}
	
	.radio-group {
		margin-bottom: 20px;
	}
	
	.radio-group label {
		display: inline-block;
		margin-right: 20px;
		cursor: pointer;
		color: #ffd700;
		font-weight: 600;
	}

	button {
		padding: 12px 24px;
		background-color: #ffd700;
		color: #121212;
		border: none;
		border-radius: 6px;
		font-weight: bold;
		cursor: pointer;
		font-size: 16px;
		transition: background-color 0.3s ease, transform 0.3s ease;
		box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
	}

	button:hover {
		background-color: #ffcc00; 
		transform: translateY(-2px); 
	}

	button:active {
		background-color: #ffb300; 
		transform: translateY(1px); 
	}

	button:focus {
		outline: none;
	}

	footer p {
		font-size: 0.9em;
		color: #aaa;
		letter-spacing: 0.5px;
	}

	.alert {
		padding: 15px;
		margin: 15px 0;
		border-radius: 8px;
		font-weight: bold;
		text-align: center;
		transition: opacity 0.3s ease;
	}
	
	.alert-success {
		background-color: #4CAF50; 
		color: white;
	}

	.alert-error {
		background-color: #f44336; 
		color: white;
	}

	.alert.hide {
		display: none;
	}

	footer {
		margin-top: auto;
	}

	footer p {
		color: #ccc;
		font-size: 14px;
	}


    </style>
</head>
<body>

    <header>
        <h2>ΣΑΕΚ Κορυδαλλού</h2>
    </header>

    <div class="container">
        <h2>Εισαγωγή στοιχείων σπουδαστή:</h2>
        
        
        <div id="alert" class="alert" style="display: none;"></div>

        <form id="registrationForm">
            <label for="username">Εισάγετε το όνομά σας:</label>
            <input type="text" id="username" name="username" required>

            <label for="surname">Εισάγετε το επώνυμο σας:</label>
            <input type="text" id="surname" name="surname" required>

            <label>Επιλέξτε το φύλο σας:</label>
            <div class="radio-group">
                <input type="radio" name="gender" value="Αρρεν" id="gender" required>
                <label for="gender">Αρρεν</label>
                <br><input type="radio" name="gender" value="Θήλυ" id="gender">
                <label for="gender">Θήλυ</label>
            </div>

            <label for="department">Επιλέξτε το τμήμα σας:</label>
            <select name="department" id="department">
                <option value="Τεχνικός Εφαρμογών Πληροφορικής - ΤΕΠ">Τεχνικός Εφαρμογών Πληροφορικής - ΤΕΠ</option>
                <option value="Μηχανολογία">Μηχανολογία</option>
                <option value="Διοίκηση">Διοίκηση</option>
            </select>

            <div>
                <button type="submit">Υποβολή</button>
                <button type="reset">Απαλοιφή</button>
            </div>
        </form>
    </div>

    <footer>
        <p>Copyright © 2016 Theodoros Efstathiadis - All rights reserved</p>
    </footer>

    <script>
        
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const formData = new FormData(this);

            fetch('processV2.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
    const alertDiv = document.getElementById('alert');
    if (data.success) {
        window.location.href = data.redirect;
    } else {
        alertDiv.classList.add('alert-error');
        alertDiv.classList.remove('alert-success');
        alertDiv.textContent = data.message;
        alertDiv.style.display = 'block';
    }
})
            .catch(error => console.error('Error:', error));
        });
    </script>

</body>
</html>
