<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Creation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
            text-align: center;
        }

        h2 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: bold;
            text-align: left;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #Email {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Email Creation</h2>
        <form onsubmit="createEmailAddress(); return false;">
            <label for="name">Enter Name</label>
            <input type="text" id="name" name="Name" placeholder="Giwrgos" required>
            
            <label for="sname">Enter Surname</label>
            <input type="text" id="sname" name="SName" placeholder="Papadopoulos" required>
            
            <button type="submit">Create Email</button>
        </form>
        <p id="Email"></p>
    </div>

    <script>
        function createEmailAddress() {
            let name = document.getElementById("name").value.trim();
            let surname = document.getElementById("sname").value.trim();

            if (name === "" || surname === "") {
                document.getElementById("Email").textContent = "Please enter valid details.";
                return;
            }

            let emailName = name.charAt(0).toLowerCase() + name.slice(1, 3).toLowerCase();
            let emailSurname = surname.charAt(0).toLowerCase() + surname.slice(1, 3).toLowerCase();
            let email = emailName + emailSurname + "@inform.com";

            document.getElementById("Email").textContent = "Your email: " + email;
        }
    </script>

</body>
</html>
