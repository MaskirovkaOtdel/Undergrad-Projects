<!Doctype html>
<html>
<head>
	<meta charset = "UTF-8">
	<Title>Guess the Number</title>
	<style>
	body { 
	pading: 20px;
	text-align: center;
	}
	
	button {
	margin: 10px;
	padding: 10px 20px;
	font-sze: 18px;
	}
	
	#result { 
	font-size: 22px;
	margin-top: 20px;
	}
	</style>
	</head>
	<body>
	
	<h1>Guess the Number (1-5)</h2>
	<p>press a number:</p>
	
	<button onclick="guessNumber(1)">1</button>
	<button onclick="guessNumber(2)">2</button>
	<button onclick="guessNumber(3)">3</button>
	<button onclick="guessNumber(4)">4</button>
	<button onclick="guessNumber(5)">5</button>

	<p id="result">Good Luck!</p>
	<p>Attempts:<span id="tries">0</span><p>
	
	<button onclick="resetGame()">Play Again</button>
</body>

<script>
 let secret = Math.floor(Math.random()*5)+1;
 let tries = 0;
 
 function guessNumber(number) {
 tries++;
 document.getElementById("tries").innerText=tries;
 
 let result = document.getElementById("result");
 
 if(number === secret) {
 result.innerText = `Correct! The number was ${secret}!`;
 result.style.color = "green";
 }
 else {
 result.innerText = "Incorrect, try again!";
 result.style.color = "red";
 }
 }
 function resetGame() {
 secret = Math.floor(Math.random()*5)+1;
 tries = 0;
 document.getElementById("tries").innerText="0";
 document.getElementById("result").innerText = "Restart!";
 }
 </script>
 </html>
