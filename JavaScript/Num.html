<!Doctype html>
<html>
<head>
<meta charset ='UTF-8'>
<title>Math Functions</title>
</head>
<body>
<script>
	let x = -10;
	let y = 3;
	
	document.write(`Numbers : ${x} , ${y} <br>`);
	document.write(`Absolute value : ${Math.abs(x)} <br>`);
	document.write(`Power raising : ${Math.pow(x,y)} <br>`);
	document.write(`Square root : ${Math.sqrt(x,y)} <br>`);
	document.write(`Random between : ${Math.random(x,y)} <br>`);
	document.write(`Maximum : ${Math.max(x,y)} <br>`);
	document.write(`Minimum : ${Math.min(x,y)} <br>`);
</script>	
</body>
</html>
