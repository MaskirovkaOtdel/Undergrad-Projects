<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grading Categorization</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .error {
      color: red;
    }

    .result {
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Grading Categorization</h1>
  
  <form id="gradeForm">
    <label for="vocal">Vocal Grade (0-10):</label>
    <input type="number" id="vocal" name="vocal" min="0" max="10" required><br><br>

    <label for="writing">Writing Grade (0-10):</label>
    <input type="number" id="writing" name="writing" min="0" max="10" required><br><br>

    <label for="exercise">Exercise Grade (0-10):</label>
    <input type="number" id="exercise" name="exercise" min="0" max="10" required><br><br>

    <button type="button" onclick="Grade()">Calculate Grade</button>
  </form>

  <p id="errorMessage" class="error"></p>

  <div id="result" class="result"></div>

  <script>
    function Grade() {
      const errorMessage = document.getElementById('errorMessage');
      const resultDiv = document.getElementById('result');

      
      const grades = ['vocal', 'writing', 'exercise'].map(id => parseFloat(document.getElementById(id).value));

     
      errorMessage.textContent = '';
      resultDiv.textContent = '';

      
      if (grades.some(grade => isNaN(grade) || grade < 0 || grade > 10)) {
        errorMessage.textContent = 'Error: Grades must be between 0 and 10.';
        return;
      }

      
      const finalGrade = grades[0] * 0.30 + grades[1] * 0.60 + grades[2] * 0.10;

     
      const gradeCategory = finalGrade < 5 ? 'Insufficient' :
                            finalGrade < 7 ? 'Approx Well' :
                            finalGrade < 9 ? 'Well' : 'Excellent';

      
      resultDiv.textContent = `Final Grade: ${finalGrade.toFixed(2)} - ${gradeCategory}`;
    }
  </script>

</body>
</html>
