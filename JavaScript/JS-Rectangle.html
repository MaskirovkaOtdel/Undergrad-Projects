<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rectangle Calculator</title>
</head>
<body>

<label for="length">Give the rectangle length:</label>
<input type="number" id="length" required> <br><br>

<label for="width">Give the rectangle width:</label>
<input type="number" id="width" required> <br><br>

<button onclick="calculateArea()">Calculate</button>

<p id="result"></p>

<script>
function calculateArea() {
  const length = parseFloat(document.getElementById('length').value);
  const width = parseFloat(document.getElementById('width').value);
  const resultElement = document.getElementById('result');

  
  if (!isNaN(length) && !isNaN(width) && length > 0 && width > 0) {
    const area = length * width;
    resultElement.innerText = `The surface area of the rectangle is: ${area} square units`;
  } else {
    resultElement.innerText = "Please enter valid positive values for both length and width.";
  }
}
</script>

</body>
</html>
