<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Description</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: #444;
        }

        label {
            font-size: 16px;
            margin-bottom: 5px;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        button:hover {
            background-color: #45a049;
        }

        #description {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #333;
            padding: 15px;
            background-color: #e7f3e7;
            border-radius: 5px;
            display: none;
        }

        #description.error {
            background-color: #f8d7da;
            color: #721c24;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Animal Sound Description</h1>
        
        <label for="animalName">Enter Animal Name: </label>
        <input type="text" id="animalName" placeholder="e.g., Lion">

        <label for="speciesName">Enter Species Name: </label>
        <input type="text" id="speciesName" placeholder="e.g., Panthera leo">

        <label for="soundDescription">Describe the sound (e.g., Roar): </label>
        <input type="text" id="soundDescription" placeholder="e.g., Roar">

        <button onclick="showDescription()">Show Description</button>

        <div id="description"></div>
    </div>

    <script>
        function showDescription() {
            const animalName = document.getElementById('animalName').value;
            const speciesName = document.getElementById('speciesName').value;
            const soundDescription = document.getElementById('soundDescription').value;
            const descriptionDiv = document.getElementById('description');

            if (animalName && speciesName && soundDescription) {
                descriptionDiv.classList.remove('error');
                descriptionDiv.innerHTML = `
                    The ${animalName} <br> (${speciesName}) makes a sound like a ${soundDescription}.
                `;
                descriptionDiv.style.display = 'block';
            } else {
                descriptionDiv.classList.add('error');
                descriptionDiv.innerHTML = "Please fill in all fields.";
                descriptionDiv.style.display = 'block';
            }
        }
    </script>

</body>
</html>
