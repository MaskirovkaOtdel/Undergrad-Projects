<button onclick="getUsers()">Δες</button>
<ul id="userList"></ul>

<script>

function getUsers() {
	fetch("https://jsonplaceholder.typicode.com/users")
	
	.then(res => res.json())
	.then (users => {
		let list = document.getElementById("userList");
		list.innerHTML="";
		users.forEach(user => {
			let li = document.createElement("li");
			li.innerText=user.name + "-" + user.email;
			list.appendChild(li);
			});
		});
	}
</script>
