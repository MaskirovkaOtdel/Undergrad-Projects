<!Doctype html>
<html>
<body>
<h1>Javascript Strings</h1>
<p with backticks, we can enter variables inside an alphanumeric string 
using ${}.</p>
<script>
let x = 10;
let y = 20;
console.log(`The sum of ${x} and ${y} is ${x+y}.`);

document.write(`The sum of ${x} and ${y} is ${x + y}.`)
</script>
</body>
</html>
