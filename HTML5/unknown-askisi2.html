	padding: 20px;

	}

	}
	table {
	width: 80%;
	margin: 20px auto;
	border-collapse: collapse;

	background: #fff
	}
	table th, table td {
	border: 1px solid #ddd;
	paddling: 10px;
	text-align: center;
	}
	table th {
	background-color: #f4f4f4;
	}
	</style>
