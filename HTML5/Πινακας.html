<!Doctype html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinakothiki</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    height: 100vh; 
    background-color: #f9f9f9;
    flex-direction: column; 

	}
.container {
    width: 700px;
    padding: 20px;
    border: 5px solid red;
    border-radius: 10px;
    background-color: #f9f9f9;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: flex-start; 
    align-items: flex-start; 
}


.title {
    text-align: center;
    font-size: 24px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: blue;
    margin-bottom: 20px;
    margin-left: 20px; 
}


.foto-container {
    width: 200px; 
    height: 200px;
    border: 5px solid black; 
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #eaeaea;
    margin-right: 20px;
}


.table-container {
    width: 100%;
	


}
.table-container h2 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 15px;
    font-weight: bold;
}
.table-container table {
    width: 100%;
    border-collapse: collapse;
    border: 2px dashed #333;
    border-radius: 10px;
}
.table-container th, .table-container td {
    padding: 10px; 
    text-align: center;
}
.table-container th {
    background-color: #f2f2f2
	

}
.table-container td img {
    width: 100px;
    height: auto;

}


.table-container td:hover {
    background-color: orange;
}


.items-container {
    margin: 20px;
}
</style>
</head>
<body>


<h1 class="title">Κατάλογος Πινακοθήκης</h1>


<div class="container">

    <div class="foto-container">
        <p>Φωτογραφία</p>
    </div>


    <div class="table-container">
        <h2>Κατάλογος</h2>
        <table>
            <thead>
                <tr>
                    <th>ΚΑΤΑΛΟΓΟΣ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><img src="your-image-url.jpg" alt="Πίνακας 1"></td>
                    <td>Αυτή είναι η περιγραφή του πρώτου πίνακα.</td>
                </tr>
                <tr>
                    <td><img src="your-image-url.jpg" alt="Πίνακας 2"></td>
                    <td>Αυτή είναι η περιγραφή του δεύτερου πίνακα.</td>
                </tr>
                
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
