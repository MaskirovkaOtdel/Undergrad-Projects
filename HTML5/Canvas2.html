<!Doctype html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Experiment 2</title>
</head>
<body>
	<canvas id="Canvas1" width="1280" height="720"
	style="border:4px dotted black;"></canvas>
	<script>
	const canvas=document.getElementById("Canvas1");
	const ctx=canvas.getContext("2d");
	
	const centerX = canvas.width / 2;
	const centerY = canvas.height / 2;
	const radius = 150;
	
	ctx.fillStyle="Red"
	ctx.arc(centerX, centerY, radius,150,100,50,0,2*Math.PI);
	ctx.fill();
	</script>
	</body>
	</html>
