<html>
<style>
	table {	
		width: 50%
		border: solid 5px gray;
		border-collapse: collapse;
		margin: 20px 0;
		box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
		}
	thead, th {
	    font-family: Arial;
		background-color: #2c6b2f;
		color: white;
		text-align: center;
		padding: 10px;
		font-size: 1em;
		text-transform: uppercase;
		border: 1px solid #ddd;
		}
	tbody, td {
		text-align: center;
		padding: 10px;
		font-size: 1em;
		border: 1px solid #ddd;
		background-color: #e8f4e8;
		}
	
</style>
<body>
<table>
	<thead>
		<tr>
			<th>ΕΤΑΙΡΕΙΑ</th>
			<th>ΕΙΔΟΣ</th>
			<th>ΠΩΛΗΣΕΙΣ</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td>ABC</td>
			<td>Φαρμακευτικα Προιοντα</td>
			<td>10.000 EUR</td>
		</tr>
		<tr>
			<td>GHBC</td>
			<td>Χημικα προιοντα</td>
			<td>7.000 EUR</td>
		</tr>
		<tr>
			<td>PetAni</td>
			<td>Προιοντα για Κατοικιδια</td>
			<td>14.000 EUR</td>
		</tr>
	</tbody>
</table>
</body>
</html>
