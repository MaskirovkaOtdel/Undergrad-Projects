<!Doctype html>
<html lang="el">
	<head>
		<meta charset="UTF-8">
	</head>
	<style>
		body { background-color: DCD6D0;}
		.container { 
			display: flex;
			flex-direction: column; 
			background-color: #969696;
			border-radius: 15px;
			width: 480px;
			flex-wrap: wrap; 
			justify-content: space-between;
			align-items: center;
		}
		.container div {
			width: 120px;
			height: 100px;
			margin: 1px;
			text-align: center;
			line-height: 100px;
			font-size: 20px;
			border-radius: 20%;
			color: white;
		}
		#one { background-color: #000000; }
		#two { background-color: #333333; }
		#three { background-color: #565656; }
	</style>
