<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Box Animation</title>
	<style>
		.box {
			width: 80px;
			height: 80px;
			background-color: blue;
			margin: 100px auto;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			transition: transform 3s ease-in-out, background-color 2s ease-in-out;
			align-items: center;
			color: white;
			font-size: 10px;
			text-align: center;
		}
		
		.box:hover {
			background-color: green;
			transform: translate(-50%, -50%) scale(15) rotate(360deg);
		}
	</style>
</head>
<body>
	<div class="box">Gomu Gomu Nooo...</br>˙˙˙oooN nɯoפ nɯoפ</div>
</body>
</html>
