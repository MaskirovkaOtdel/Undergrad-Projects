<!Doctype html>
<html>
<header>
<meta charset="UTF-8" lang="el">
</header>
<body>
<p><h1> <b>Παρακαλώ συμπληρώστε την παρακάτω φόρμα</b></h1></p>
<hr>
	<form method="post" action="" id="fillform">
	<label for="fname">Όνομα :</label><br>
	<input type="text" id="fname" name="fname"><br><br>
	<label for="lname">Επίθετο :</label><br>
	<input type="text" id="lname" name="lname"><br><br>
	<label for="class">Τάξη :</label><br>
	<input type="text" id="class" name="class"><br><br>
	<label for="reg">Αριθμός Μητρώου(4 χαρακτήρες) :</label><br>
	<input type="text" id="reg" name="reg"><br><br>
	<label for="birthday">Ημερομηνία Γέννησης :</label><br>
	<input type="date" id="birthday" name="birthday"><br><br>
	<label for="email">Email :</label><br>
	<input type="email" id="email" name="email"><br><br>
	<label for="phone">Τηλέφωνο</label><br>
	<input type="tel" name="phone" placeholder="123-45-67-890"
	pattern="[0-9]{3}-[0-9]{2}-[0-9]{2}-[0-9]{3}"><br><br>
	<label for="age">Ηλικία :</label><br>
	<input type="number" min="18" max="90"><br><br>
	<label for="semester">Εξάμηνο (Τιμή μεταξύ 1 και 10)</label><br>
	<input type="range" min="1" max="10" value="5" name="sem"><br><br>
	
	<label><i><u> Επιλογή Μαθημάτων</u></i></label><br><br>
	<input type="checkbox" name="math1" value="sxe">
	<label for="math1">Σχέδιο</label><br>
	<input type="checkbox" name="math2" value="arch">
	<label for="math1">Αρχιτεκτονική Η/Υ</label><br>
	<input type="checkbox" name="math3" value="dbase">
	<label for="math1">Βάσεις Δεδομένων</label><br>
	<input type="checkbox" name="math4" value="prog">
	<label for="math1">Προγραμματισμός WEB</label><br>
	&nbsp &nbsp <input type="radio" name="plang" value="1" id="HTML">
	<label for="HTML">HTML</label><br>
	&nbsp &nbsp <input type="radio" name="plang" value="2" id="CSS">
	<label for="CSS">CSS</label><br>
	&nbsp &nbsp <input type="radio" name="Βαθμός" value="3" id="JavaScript">
	<label for="JavaScript">JavaScript</label><br>
	
	</form>
	</body>
	</html>
