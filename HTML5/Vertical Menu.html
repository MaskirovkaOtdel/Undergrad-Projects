<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Vertical Menu</title>
</head>
<style>
.mbox {
	padding: 10px;
	background-color: #f1f0f0;
	width: 100px;
	border-radius: 10px;
}
ul {
	list-style-type:none;
	padding:0px;
	margin:0px;
}
li {
	display: block;
	margin-bottom: 10px;
}
a {
	text-decoration:none;
	font-family:sans-seriff;
	color:black;
	font-size:18px;
}
a:hover {
	background-color:blue;
	color:white;
}
</style>
<body>
<h1>ΚΑΘΕΤΟ ΜΕΝΟΥ ΠΛΟΗΓΗΣΗΣ</h1>
<div class="mbox">
<ul>
	<li class="arxi"><a href="#">Αρχική</a></li>
	<li class="arxi"><a href="#">Νέα</a></li>
	<li class="arxi"><a href="#">Υπηρεσίες</a></li>
	<li class="arxi"><a href="#">Επικοινωνία</a></li>
</ul>
</div>
</body>
</html>
