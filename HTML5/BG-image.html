<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Image</title>
  <style>
    body {
      background-image: url("Olofmeister.jpg");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: 1980px 480px;
      height: 100vh; 
      margin: 0;
      position: relative; 
    }
    p {
      position: absolute; 
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white; 
      font-size: 24px; 
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); 
    }
  </style>
</head>
<body>
    <p>Olofmeister defuse legend</p>
</body>
</html>
