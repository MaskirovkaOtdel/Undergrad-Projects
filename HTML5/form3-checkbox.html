<!Doctype html>
<html>
<header>
<meta charset="UTF-8">
</header>
<body>
<p><h1> <b>ΑΓΟΡΑ PC PARTS - E-shop</b></h1></p>
<hr>

<form id="PC" method="post" action="">
	<label for="PC"><b><h3>ΣΤΑΘΕΡΟΣ Η/Υ :</h3></b></label>
	<fieldset>
	 <legend>Εξαρτήματα Η/Υ</legend>

	 <input type="checkbox" id="monitor" name="parts[]" value="1">
	 <label for="monitor">ΟΘΟΝΗ</label><br>
	 
	 <input type="checkbox" id="mouse" name="parts[]" value="2">
	 <label for="mouse">ΠΟΝΤΙΚΙ</label><br>
	 
	 <input type="checkbox" id="keyboard" name="parts[]" value="3">
	 <label for="keyboard">ΠΛΗΚΤΡΟΛΟΓΙΟ</label><br>
	 
	 <input type="checkbox" id="ram" name="parts[]" value="4">
	 <label for="ram">ΜΝΗΜΗ RAM</label><br><br>

	 <p>Λογαριασμός</p>
	 <label for="fname">Όνομα :</label>
	 <input type="text" id="fname" name="fname"><br><br>
	 
	 <label for="lname">Επίθετο :</label>
	 <input type="text" id="lname" name="lname"><br><br>
	 
	 <label for="email">Email :</label>
	 <input type="email" id="email" name="email"><br><br>
	 
	 <label for="birthday">Ημερομηνία Γέννησης :</label>
	 <input type="date" id="birthday" name="birthday"><br><br>
	 
	 <label for="pas">Κωδικός Χρήστη :</label>
	 <input type="password" id="pass" name="pas"><br><br>
	 
	 <input type="submit" value="Submit">
	</fieldset>
</form>
</body>
</html>
