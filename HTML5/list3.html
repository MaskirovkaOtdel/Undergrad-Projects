<!DOCTYPE HTML>
<html lang="el">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ήπειροι - Χώρες</title>
    <style>
      /* Basic Page Styling */
      body {
        font-family: 'Arial', sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
      }

      h1 {
        background-color: #3a6ea5;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 36px;
        margin-bottom: 40px;
      }

      h2 {
        font-size: 24px;
        color: #2a4d6d;
        margin: 10px 0;
      }

      b {
        font-weight: bold;
      }

      /* Styling the Ordered List */
      ol {
        max-width: 800px;
        margin: 0 auto;
        padding-left: 20px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      /* Styling the List Items */
      li {
        padding: 10px 20px;
        border-bottom: 1px solid #ddd;
      }

      li:last-child {
        border-bottom: none;
      }

      li:hover {
        background-color: #e0f7fa;
        cursor: pointer;
      }

      /* Nested Lists Styling */
      ul {
        padding-left: 40px;
        list-style-type: square;
      }

      ul li {
        font-size: 18px;
        color: #4b4b4b;
      }

      /* Highlighted continents */
      b {
        color: #1e3d58;
      }

      /* Responsive adjustments */
      @media screen and (max-width: 600px) {
        h1 {
          font-size: 28px;
          padding: 15px;
        }

        ol {
          padding-left: 10px;
        }

        li {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <h1><b>Ήπειροι - Χώρες</b></h1>
    <ol>
      <!-- Asia -->
      <li>
        <h2 style="background-color:Gray;"><b>ΑΣΙΑ</b></h2>
        <ul>
          <li>ΚΙΝΑ</li>
          <li>ΙΑΠΩΝΙΑ</li>
          <li>ΚΟΡΕΑ</li>
        </ul>
      </li>

      <!-- Europe -->
      <li>
        <h2 style="background-color:Magenta;"><b>ΕΥΡΩΠΗ</b></h2>
        <ul>
          <li>ΜΑΛΤΑ</li>
          <li>ΕΛΛΑΔΑ</li>
          <li>ΔΑΝΙΑ</li>
        </ul>
      </li>

      <!-- America -->
      <li>
        <h2><b>ΑΜΕΡΙΚΗ</b></h2>
        <ul>
          <li><b><p style="background-color:dodgerBlue;">ΒΟΡΕΙΑ ΑΜΕΡΙΚΗ</p></b>
            <ul>
              <li>ΚΑΝΑΔΑΣ</li>
              <li>ΗΠΑ</li>
            </ul>
          </li>
          <li><b><p style="background-color:Tomato;">ΝΟΤΙΑ ΑΜΕΡΙΚΗ</p></b>
            <ul>
              <li>ΒΡΑΖΙΛΙΑ</li>
              <li>ΧΙΛΗ</li>
            </ul>
          </li>
        </ul>
      </li>
    </ol>
  </body>
</html>
